<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img">
  <title>用 GitHub Issue 发布博客的流程图</title>
  <desc>展示从新建 Issue 到文章出现在个人主页的五步流程。</desc>
  <rect width="1200" height="720" fill="#0a0a0a"/>
  <text x="80" y="86" fill="#e6e6e3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="700">写博客，变成开一个 Issue</text>
  <text x="80" y="132" fill="#8a8a85" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">不用后台，不用数据库，GitHub 自己就是内容管理器。</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3ddc84" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g transform="translate(82 240)">
      <rect width="178" height="152" rx="18" fill="#101010" stroke="#2c2c2c" stroke-width="2"/>
      <text x="28" y="52" fill="#3ddc84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">01</text>
      <text x="28" y="91" fill="#e6e6e3" font-size="26" font-weight="700">新建 Issue</text>
      <text x="28" y="126" fill="#8a8a85" font-size="19">标题就是文章标题</text>
    </g>
    <path d="M260 316H326" stroke="#3ddc84" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <g transform="translate(326 240)">
      <rect width="178" height="152" rx="18" fill="#101010" stroke="#2c2c2c" stroke-width="2"/>
      <text x="28" y="52" fill="#3ddc84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">02</text>
      <text x="28" y="91" fill="#e6e6e3" font-size="26" font-weight="700">写 Markdown</text>
      <text x="28" y="126" fill="#8a8a85" font-size="19">正文直接放内容</text>
    </g>
    <path d="M504 316H570" stroke="#3ddc84" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <g transform="translate(570 240)">
      <rect width="178" height="152" rx="18" fill="#101010" stroke="#2c2c2c" stroke-width="2"/>
      <text x="28" y="52" fill="#3ddc84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">03</text>
      <text x="28" y="91" fill="#e6e6e3" font-size="26" font-weight="700">打 blog 标签</text>
      <text x="28" y="126" fill="#8a8a85" font-size="19">前端只读取它</text>
    </g>
    <path d="M748 316H814" stroke="#3ddc84" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <g transform="translate(814 240)">
      <rect width="178" height="152" rx="18" fill="#101010" stroke="#2c2c2c" stroke-width="2"/>
      <text x="28" y="52" fill="#3ddc84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="24">04</text>
      <text x="28" y="91" fill="#e6e6e3" font-size="26" font-weight="700">API 拉取</text>
      <text x="28" y="126" fill="#8a8a85" font-size="19">生成文章列表</text>
    </g>
    <path d="M992 316H1058" stroke="#3ddc84" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
    <g transform="translate(1058 240)">
      <rect width="62" height="152" rx="18" fill="#3ddc84"/>
      <text x="31" y="57" text-anchor="middle" fill="#0a0a0a" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22" font-weight="700">05</text>
      <text x="31" y="93" text-anchor="middle" fill="#0a0a0a" font-size="22" font-weight="700">上线</text>
      <text x="31" y="122" text-anchor="middle" fill="#0a0a0a" font-size="18">展示</text>
    </g>
  </g>
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <rect x="178" y="502" width="844" height="96" rx="18" fill="#101010" stroke="#3ddc84" stroke-width="2"/>
    <text x="228" y="560" fill="#e6e6e3" font-size="28" font-weight="700">最关键的约定：</text>
    <text x="448" y="560" fill="#3ddc84" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="28">labels=blog</text>
    <text x="640" y="560" fill="#8a8a85" font-size="24">，就把 Issue 当作文章。</text>
  </g>
</svg>
